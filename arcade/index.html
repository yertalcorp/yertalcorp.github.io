<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YERTAL | Laboratory Arcade</title>
    <link rel="stylesheet" href="/css/system_styles.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/arcade.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" id="google-fonts-link" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap">
</head>

<body id="lab-body">

    <header id="arcade-header">
    </header>
    <div class="tutorial-mask"></div>
    <div class="tutorial-tooltip"></div>
    <main class="max-width-limit">
        <div id="currents-container">
            </div>
    </main>

    <div id="main-drawer" class="glass-drawer">
        <div class="drawer-header">
            <h2 class="metallic-text">ARCADE_OS</h2>
            <button onclick="toggleDrawer()" class="generate-btn">&times;</button>
        </div>

        <div id="drawer-main-nav">
            <div class="menu-item" onclick="showSubMenu('settings')">
                <i class="fa-solid fa-gear"></i> <span class="metallic-text">SETTINGS</span>
            </div>
            <div class="menu-item" onclick="showSubMenu('help')">
                <i class="fa-solid fa-circle-question"></i> <span class="metallic-text">HELP</span>
            </div>
        </div>

        <div id="drawer-settings" class="sub-menu" style="display:none;">
            <div class="back-btn" onclick="showMainMenu()"><i class="fa-solid fa-chevron-left"></i> BACK</div>
    
            <div class="settings-group">
                <div class="menu-item" onclick="openArcadeSettings()">
                    <i class="fa-solid fa-palette"></i> UPDATE_ARCADE_IDENTITY
                </div>

                <div id="admin-settings-trigger" class="menu-item" onclick="openAdminSettings()" style="display:none;">
                    <i class="fa-solid fa-shield-halved"></i> ADMIN_SETTINGS
                </div>
            </div>
        </div>

        <div id="drawer-help" class="sub-menu" style="display:none;">
            <div class="back-btn" onclick="showMainMenu()"><i class="fa-solid fa-chevron-left"></i> BACK</div>
            <div class="menu-item"><i class="fa-solid fa-comments"></i> <span class="metallic-text">CHAT</span></div>
            <div class="menu-item" onclick="window.handleTutorialTrigger()"><i class="fa-solid fa-book-open"></i><span class="metallic-text">TUTORIAL</span></div>
            <div class="menu-item"><i class="fa-solid fa-circle-info"></i> <span class="metallic-text">SYSTEM_TOPICS</span></div>
        </div>
    </div>

    <div id="intent-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center;">
        <div class="hud-window animate-slideUp" style="padding: 2.5rem; max-width: 400px; width: 90%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">
            <h4 class="metallic-text" style="font-size: 11px;">Specify Creative Intent</h4>
            <div style="display: flex; flex-direction: column; width: 100%; gap: 1rem;">
                <button id="choice-a" class="cat-btn"></button>
                <button id="choice-b" class="cat-btn"></button>
            </div>
            <button onclick="document.getElementById('intent-modal').style.display='none'" style="background: none; border: none; color: rgba(255,255,255,0.3); font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.15em;">Cancel</button>
        </div>
    </div>

    <footer id="footer-container" style="background: var(--bg-color);">
    </footer>
    
    <script type="module" src="/js/arcade.js"></script>
<div id="add-current-hud" class="hud-overlay" style="display: none;">
    <div class="hud-window glass-3d animate-slideUp">
        <div class="hud-header-content">
            <h2 class="current-title metallic-text">INITIALIZE_CURRENT</h2>
        </div>
        
        <div class="hud-body">
            <div class="hud-onboarding-grid">
                <section class="hud-step">
                    <label class="hud-label">CURRENT_NAME</label>
                    <input type="text" id="current-name-input" class="hud-input" placeholder="Enter name...">
                </section>

<section class="hud-step">
    <label class="hud-label">CURRENT_TYPE</label>
    <div style="display: flex; gap: 10px;">
        <select id="current-type-select" class="hud-input" style="flex: 1;" onchange="document.getElementById('current-type-input').value = this.value">
        </select>
        <input type="text" id="current-type-input" class="hud-input" 
               value="Select a type..."
               onfocus="if(this.value==='Select a type...') this.value='';" 
               onblur="if(this.value==='') this.value='Select a type...';">
        </div>
</section>
                <section class="hud-step">
                    <label class="hud-label">PRIVACY_PROTOCOL</label>
                    <select id="current-privacy-select" class="hud-input">
                        <option value="private">PRIVATE</option>
                        <option value="unlisted">UNLISTED</option>
                        <option value="public">PUBLIC</option>
                    </select>
                </section>
            </div>
        </div>

        <div class="hud-footer" style="justify-items: center">
            <button id="submit-current-btn" class="ethereal-btn-sm" onclick="window.submitNewCurrent()">GENERATE_INFRASTRUCTURE</button>
            <button class="ethereal-btn-sm" style="opacity: 0.7;" onclick="window.closeAddCurrentHud()">CANCEL</button>
        </div>
    </div>
</div>
        <div id="arcadesettings-hud" class="hud-overlay">
        <div class="hud-window glass-3d animate-slideUp">
            
            <div class="hud-header-content">
                <h2 class="current-title metallic-text">ARCADE_CONFIGURATION</h2>
            </div>
            
            <div class="hud-body">
                <div class="hud-onboarding-grid">
                    
                    <section class="hud-step" id="arcade-profile-zone">
                        </section>

                    <section class="hud-step" id="plan-selection-zone">
                        </section>

                </div>
            </div>

            <div class="hud-footer">
                <button id="submit-onboarding" class="ethereal-btn-sm" onclick="saveArcadeSettings()">
                    ESTABLISH IDENTITY
                </button>
            </div>

        </div>
    </div>

</body>
</html>
