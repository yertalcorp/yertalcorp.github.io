<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YERTAL | Laboratory Arcade</title>
    <link rel="stylesheet" href="/css/system_styles.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/arcade.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" id="google-fonts-link" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap">
</head>

<body id="lab-body">

    <header id="arcade-header">
    </header>

    <main class="max-width-limit">
        <div id="currents-container">
        </div>
    </main>

    <div id="main-drawer" class="glass-drawer">
        <div class="drawer-header">
            <h2 class="metallic-text">ARCADE_OS</h2>
            <button onclick="toggleDrawer()" class="close-btn">&times;</button>
        </div>

        <div id="drawer-main-nav">
            <div class="menu-item" onclick="showSubMenu('settings')">
                <i class="fa-solid fa-gear"></i> SETTINGS
            </div>
            <div class="menu-item" onclick="showSubMenu('help')">
                <i class="fa-solid fa-circle-question"></i> HELP
            </div>
        </div>

        <div id="drawer-settings" class="sub-menu" style="display:none;">
            <div class="back-btn" onclick="showMainMenu()"><i class="fa-solid fa-chevron-left"></i> BACK</div>
            
            <div class="settings-group">
                <label>DISPLAY NAME</label>
                <input type="text" id="set-display-name" class="hud-input">
                
                <label>ARCADE TITLE</label>
                <input type="text" id="set-arcade-title" class="hud-input">
                
                <label>SUBTITLE</label>
                <input type="text" id="set-arcade-subtitle" class="hud-input">

                <label>LOGO URL</label>
                <input type="text" id="set-arcade-logo" class="hud-input">

                <label>THEME</label>
                <select id="set-arcade-theme" class="hud-input">
                    <option value="neon-dark">NEON_DARK</option>
                    <option value="silicon-light">SILICON_LIGHT</option>
                    <option value="spring-bloom">SPRING_BLOOM</option>
                    <option value="summer-solstice">SUMMER_SOLSTICE</option>
                    <option value="autumn-ember">AUTUMN_EMBER</option>
                    <option value="winter-frost">WINTER_FROST</option>
                </select>
            </div>

            <button class="ethereal-btn-sm" onclick="saveAllSettings()" style="width: 100%; margin-top: 20px;">
                COMMIT_CHANGES
            </button>
        </div>

        <div id="drawer-help" class="sub-menu" style="display:none;">
            <div class="back-btn" onclick="showMainMenu()"><i class="fa-solid fa-chevron-left"></i> BACK</div>
            <div class="menu-item"><i class="fa-solid fa-comments"></i> CHAT</div>
            <div class="menu-item"><i class="fa-solid fa-book-open"></i> TUTORIAL</div>
            <div class="menu-item"><i class="fa-solid fa-circle-info"></i> SYSTEM_TOPICS</div>
        </div>
    </div>

    <div id="intent-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000; display: none; align-items: center; justify-content: center;">
        <div class="glass" style="padding: 2.5rem; max-width: 400px; width: 90%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1.5rem; border: 1px solid rgba(255,255,255,0.1);">
            <h4 class="metallic-text" style="font-size: 11px;">Specify Creative Intent</h4>
            <div style="display: flex; flex-direction: column; width: 100%; gap: 1rem;">
                <button id="choice-a" class="spark-button"></button>
                <button id="choice-b" class="spark-button"></button>
            </div>
            <button onclick="document.getElementById('intent-modal').style.display='none'" style="background: none; border: none; color: rgba(255,255,255,0.3); font-size: 10px; cursor: pointer; text-transform: uppercase;">Cancel</button>
        </div>
    </div>

    <footer id="footer-container">
    </footer>
    
    <script type="module" src="/js/arcade.js"></script>

    <div id="onboarding-hud" class="hud-overlay">
        <div class="hud-window glass-3d animate-slideUp">
            <div class="hud-header">
            </div>
            
            <div class="hud-body">
                <div class="hud-onboarding-grid">
                    <section class="hud-step">
                        <label>ARCADE NAME <span style="color: var(--neon-color);">*</span></label>
                        <input type="text" id="new-arcade-name" placeholder="e.g., Quantum Lab" class="hud-input">
                        
                        <label>SYSTEM SUBTITLE</label>
                        <input type="text" id="new-arcade-subtitle" placeholder="Establish Your Arcade to Start Creating or Saving" class="hud-input">

                        <label>INTERFACE THEME</label>
                        <select id="arcade-theme-select" class="hud-input"></select>

                        <label>PRIVACY_PROTOCOL</label>
                        <select id="arcade-privacy-select" class="hud-input">
                            <option value="public" selected>PUBLIC</option>
                            <option value="unlisted">UNLISTED</option>
                            <option value="private">PRIVATE</option>
                        </select>

                        <label>LAB_IDENTITY_LOGO</label>
                        <div class="logo-upload-wrapper" style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                            <button type="button" class="ethereal-btn-xs" onclick="document.getElementById('logo-browse-input').click()">BROWSE_FILES</button>
                            <span id="logo-status-text" style="font-size: 9px; color: var(--text-secondary);">No file selected</span>
                            <input type="file" id="logo-browse-input" accept="image/*" style="display: none;" onchange="updateLogoStatus(this)">
                        </div>
                    </section>

                    <section class="hud-step">
                        <label>SYSTEM_PLAN_SELECTION</label>
                        <div class="plans-grid">
                            <div class="plan-card active">
                                <h3>FREE</h3>
                                <ul></ul> 
                                <p class="plan-price">$0</p>
                                <input type="radio" name="arcade-plan" value="free" checked>
                            </div>

                            <div class="plan-card disabled-tier">
                                <h3>PERSONAL</h3>
                                <ul><li>Coming Soon</li></ul>
                                <p class="plan-price">$15/mo</p>
                                <input type="radio" name="arcade-plan" value="personal" disabled>
                            </div>

                            <div class="plan-card disabled-tier">
                                <h3>BUSINESS</h3>
                                <ul>
                                    <li>Coming Soon</li>
                                    <li>Custom Shop</li>
                                </ul>
                                <p class="plan-price">$50/mo</p>
                                <input type="radio" name="arcade-plan" value="business" disabled>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <div class="hud-footer">
                <button id="submit-onboarding" class="ethereal-btn-sm" onclick="handleInitialForge()">ESTABLISH IDENTITY</button>
            </div>
        </div>
    </div>
</body>
</html>
