<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yertal Arcade | Laboratory Viewport</title>
    
    <link rel="stylesheet" href="/css/system_styles.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/arcade.css">
    <link rel="stylesheet" href="/css/spark.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black m-0 p-0 overflow-hidden" id="lab-body">

    <div id="spark-title-overlay" class="fixed top-5 left-1/2 -translate-x-1/2 z-[10000] text-center pointer-events-none">
        <h1 id="active-spark-name" class="fx-chroma-header text-4xl font-extrabold uppercase tracking-widest">Loading...</h1>
    </div>

    <button id="exit-btn" class="fixed top-5 left-5 z-[10001] fx-exit-btn glass-panel text-white">
        <i class="fas fa-arrow-left"></i>
    </button>

    <div id="prev-zone" class="fixed left-0 top-0 w-20 h-full z-[9000] flex items-center justify-center cursor-pointer">
        <div class="nav-reveal">
            <i class="fas fa-chevron-left text-2xl text-white"></i>
        </div>
    </div>
    
    <div id="next-zone" class="fixed right-0 top-0 w-20 h-full z-[9000] flex items-center justify-center cursor-pointer">
        <div class="nav-reveal">
            <i class="fas fa-chevron-right text-2xl text-white"></i>
        </div>
    </div>

    <div id="spark-content-container"></div>

    <div id="spark-hud" class="fixed bottom-5 left-1/2 -translate-x-1/2 hud-viewport-layout">
        
        <div id="thumb-trigger" class="thumb-box-viewport">
            <canvas id="live-thumb-canvas" class="w-full h-full object-cover" willReadFrequently="true"></canvas>
            <input type="file" id="thumb-upload" class="hidden" accept="image/*">
            <div class="thumb-hover">
                <i class="fas fa-camera text-white"></i>
            </div>
        </div>

        <div class="hud-control-stack">
            <div class="hud-row">
                <button id="play-pause-btn" class="text-white/80 hover:text-white bg-transparent">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>

                <div class="media-progress-container" id="progress-container">
                    <div id="media-progress-bar"></div>
                </div>

                <div class="text-[9px] font-mono text-white/50 w-20 text-right">
                    <span id="current-time">0:00</span> / <span id="total-duration">0:00</span>
                </div>
            </div>

            <div class="hud-row mt-1">
                <button id="set-cover-btn" class="generate-btn text-black text-[9px] font-black px-3 py-1.5 rounded uppercase tracking-tighter">
                    Update Thumbnail
                </button>
                <button id="zen-btn" class="glass-panel text-white/40 hover:text-white p-1.5 rounded border border-white/5">
                    <i class="fas fa-eye-slash text-[10px]"></i>
                </button>
                <div id="hud-status" class="status-readout-small metallic-text ml-auto">Viewport Ready</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="module" src="/js/spark.js"></script>
</body>
</html>
