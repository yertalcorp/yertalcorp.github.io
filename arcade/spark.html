<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yertal Arcade | Laboratory Viewport</title>
    
    <link rel="stylesheet" href="/css/system_styles.css">
    <link rel="stylesheet" href="/css/global.css">
    **<link rel="stylesheet" href="/css/spark.css">**
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black m-0 p-0 overflow-hidden" id="lab-body">
    <div id="spark-title-overlay" class="fixed top-20 left-1/2 -translate-x-1/2 z-[10000] text-center pointer-events-none">
        <h1 id="active-spark-name" class="fx-chroma-header text-4xl font-black">Loading...</h1>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="module" src="../js/spark.js"></script>

    <script>
        // Inline scripts for Zen and UI toggles stay here for quick DOM response
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'z' || e.key === 'Escape') {
                toggleZen();
            }
        });

        function toggleZen() {
            document.body.classList.toggle('zen-active');
        }

        function togglePlayPause() {
            window.dispatchEvent(new CustomEvent('toggleMedia'));
            const icon = document.getElementById('play-icon');
            icon.classList.toggle('fa-play');
            icon.classList.toggle('fa-pause');
        }
    </script>
</body>
</html>
