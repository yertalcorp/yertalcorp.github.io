<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yertal Arcade | Laboratory Viewport</title>
    
    <link rel="stylesheet" href="/css/system_styles.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/arcade.css">
    <link rel="stylesheet" href="/css/spark.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" id="google-fonts-link" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap">
</head>
<body id="lab-body">

    <button id="exit-zen-btn" title="Exit Fullscreen">
        <i class="fas fa-compress"></i>
    </button>

    <div id="spark-title-overlay">
        <h2 id="active-spark-name" class="fx-chroma-header text-3xl font-extrabold uppercase tracking-widest">
            Loading...
        </h2>
    </div>

    <button id="exit-btn" class="fixed top-5 left-5 z-[100000] arcade-button flex items-center gap-2">
        <i class="fas fa-arrow-left"></i>
        <span class="text-[10px] font-bold uppercase">Back to Arcade</span>
    </button>

    <div id="prev-zone" class="nav-zone group">
        <div class="nav-arrow">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>

    <div id="next-zone" class="nav-zone group">
        <div class="nav-arrow">
            <i class="fas fa-chevron-right"></i>
        </div>
    </div>

    <div id="spark-content-container"></div>

    <div id="spark-hud" class="fx-glass-hud fx-neon-border">
        
    <div id="edit-spark-btn" class="thumb-box-viewport group cursor-pointer" title="Edit Spark Details">
        <div class="flex flex-col gap-1 items-center justify-center h-full">
            <i class="fas fa-pen-to-square text-cyan-400"></i>
            <span class="text-[8px] font-bold text-cyan-400">EDIT SPARK</span>
        </div>
    </div>

<div class="hud-control-stack">
<div class="hud-row">
    <div class="flex items-center gap-4"> <button id="play-pause-btn" class="spark-btn" title="Play/Pause">
            <i class="fa-solid fa-play" id="play-icon"></i>
        </button>
        
        <button id="reload-spark-btn" class="spark-btn" title="Restart Spark">
            <i class="fa-solid fa-rotate-right"></i>
        </button>
         <button id="zen-btn" class="spark-btn">
            <i class="fas fa-expand text-xs"></i>
         </button>

    </div>

    <div class="media-progress-container" id="progress-container">
        <div id="media-progress-bar"></div>
    </div>

    <div class="media-time-display">
        <span id="current-time">0:00</span>/<span id="total-duration">0:00</span>
    </div>
</div>

            <div class="hud-row">
              
                <div class="status-group">
                      <div id="hud-status" class="status-readout-small text-cyan-500/80 uppercase">Initializing...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="module" src="/js/spark.js"></script>
</body>
</html>
