<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yertal Arcade | Laboratory Viewport</title>
    
    <link rel="stylesheet" href="/css/system_styles.css">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/arcade.css">
    <link rel="stylesheet" href="/css/spark.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" id="google-fonts-link" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap">
</head>
<body id="lab-body">

    <button id="exit-zen-btn" title="Exit Fullscreen">
        <i class="fas fa-compress"></i>
    </button>

    <div id="spark-title-overlay" class="fixed z-[10000] text-center pointer-events-none">
        <h1 id="active-spark-name" class="fx-chroma-header text-4xl font-extrabold uppercase tracking-widest">
            Loading...
        </h1>
    </div>

    <button id="exit-btn" class="fixed top-5 left-5 z-[10001] arcade-button flex items-center gap-2">
        <i class="fas fa-arrow-left"></i>
        <span class="text-[10px] font-bold uppercase">Back to Arcade</span>
    </button>

    <div id="prev-zone" class="fixed left-0 top-0 w-32 h-full z-[9000] flex items-center justify-center cursor-pointer group">
        <div class="nav-arrow">
            <i class="fas fa-chevron-left"></i>
        </div>
    </div>
    
    <div id="next-zone" class="fixed right-0 top-0 w-32 h-full z-[9000] flex items-center justify-center cursor-pointer group">
        <div class="nav-arrow">
            <i class="fas fa-chevron-right"></i>
        </div>
    </div>

    <div id="spark-content-container"></div>

    <div id="burst-picker-hud" class="fixed inset-0 bg-black/80 z-[11000] hidden flex-col items-center justify-center p-10">
        <h2 class="text-white uppercase tracking-widest mb-6 font-bold">Select Best Frame</h2>
        <div id="burst-grid" class="flex gap-4 overflow-x-auto pb-6 max-w-full scrollbar-thin scrollbar-thumb-cyan-500">
            </div>
        <div class="flex gap-4 mt-4">
            <button onclick="closeBurstPicker()" class="arcade-button border-gray-500 text-gray-400">Cancel</button>
        </div>
    </div>

    <div id="crop-modal" class="fixed inset-0 bg-black/95 z-[12000] hidden flex-col items-center justify-center p-5">
        <h2 class="text-cyan-400 uppercase tracking-[0.3em] text-sm mb-4">Precision Crop Selection</h2>
        
        <div class="relative max-w-[85vw] max-h-[70vh] border-2 border-cyan-500/30 shadow-[0_0_30px_rgba(0,242,255,0.1)]">
            <canvas id="crop-canvas" class="max-w-full max-h-full cursor-crosshair block"></canvas>
            
            <div class="absolute top-2 left-2 bg-black/70 text-[10px] text-cyan-400 px-3 py-1 uppercase tracking-widest border border-cyan-500/20">
                Drag to define focal area
            </div>
        </div>

        <div class="flex gap-8 mt-8">
            <button onclick="closeCropModal()" class="arcade-button opacity-50 hover:opacity-100">Cancel</button>
            <button onclick="finalizeAndUploadCrop()" class="generate-btn px-12 shadow-lg">Finalize & Sync to Cloud</button>
        </div>
    </div>

    <div id="spark-hud" class="fx-glass-hud fx-neon-border">
        
        <div id="thumb-trigger" class="thumb-box-viewport group cursor-pointer" onclick="openBurstPicker()">
            <canvas id="live-thumb-canvas" class="w-full h-full object-cover"></canvas>
            <div class="thumb-hover flex flex-col gap-1 items-center justify-center">
                <i class="fas fa-images"></i>
                <span class="text-[8px] font-bold">VIEW BURST</span>
            </div>
        </div>

        <div class="hud-control-stack">
<div class="hud-row">
    <div class="flex items-center gap-4"> <button id="play-pause-btn" class="hud-icon-btn" title="Play/Pause">
            <i class="fa-solid fa-play" id="play-icon"></i>
        </button>
        
        <button id="reload-spark-btn" class="hud-icon-btn" title="Restart Spark">
            <i class="fa-solid fa-rotate-right"></i>
        </button>
    </div>

    <div class="media-progress-container" id="progress-container">
        <div id="media-progress-bar"></div>
    </div>

    <div class="media-time-display">
        <span id="current-time">0:00</span> / <span id="total-duration">0:00</span>
    </div>
</div>

            <div class="hud-row">
                <button id="set-cover-btn" class="generate-btn" onclick="openBurstPicker()">
                    Capture Live
                </button>
                
                <button id="upload-trigger-btn" class="generate-btn" style="border-style: dashed;" onclick="document.getElementById('manual-upload').click()">
                    Upload File
                </button>
                
                <input type="file" id="manual-upload" style="display:none" accept="image/*">
                
                <div class="status-group">
                    <button id="zen-btn" class="arcade-button py-1 px-3">
                        <i class="fas fa-expand text-xs"></i>
                    </button>
                    <div id="hud-status" class="status-readout-small text-cyan-500/80 uppercase">Initializing...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script type="module" src="/js/spark.js"></script>
</body>
</html>
