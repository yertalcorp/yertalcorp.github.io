<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>YERTAL CORP | Build Realms</title>
    <link rel="stylesheet" href="./css/system_styles.css">
    <link rel="stylesheet" href="./css/global.css">
    <link rel="stylesheet" href="./css/showroom_style.css">
    <link rel="stylesheet" id="google-fonts-link">
    <link rel="stylesheet" id="font-awesome-link">
</head>
<body class="bg-[#050505]">

    <nav class="glass fixed w-full z-50 px-6 py-4 flex justify-between items-center main-nav">
        <div id="nav-logo" class="logo-container"></div>
        
        <div id="nav-menu" class="hidden md:flex gap-8 items-center"></div>
        
        <div class="flex items-center gap-4">
            <div id="auth-zone"></div>
        </div>
    </nav>

    <main class="pt-24 px-6 max-w-7xl mx-auto">
        
        <section id="hero-container" class="min-h-[70vh] flex flex-col justify-center items-center relative overflow-hidden">
            <div class="py-16 text-center animate-fadeIn z-10 max-w-4xl"></div>
        </section>

        <section class="mb-24">
            <div id="featured-realms-header" class="mb-10 text-left"></div>
            <div id="showcase-grid" class="flex flex-wrap gap-6 mb-16"></div>
        </section>

        <section id="visual-flow-container" class="py-20 mb-24 border-t border-b border-white/5 text-center"></section>

        <section class="mb-24">
            <div id="trending-sparks-header" class="mb-10 flex justify-between items-end"></div>
            <div id="trending-sparks-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="templates-container" class="mb-24">
            <div id="templates-header" class="mb-10"></div>
            <div id="templates-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </section>

        <section id="learn-container" class="mb-24 pt-12 border-t border-white/5">
            <div id="learn-header" class="mb-8"></div>
            <div id="action-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12"></div>
        </section>

        <section id="community-insight-container" class="mb-24 text-center py-12 glass-card metallic-bezel max-w-4xl mx-auto"></section>

        <section id="final-cta-container" class="py-24 text-center max-w-3xl mx-auto mb-16"></section>
    </main>

    <footer id="footer-container" class="py-12 px-6 border-t border-white/5"></footer>

    <div id="admin-gateway"></div>
    
    <script type="module" src="./js/realms.js"></script>

    <div id="auth-hud">
        <div class=\"glass-card metallic-bezel hud-bezel-fixed flex flex-col items-center\">
            <h2 class=\"uppercase font-black\" style=\"filter: drop-shadow(0 0 8px var(--neon-color));\">
                ACCESS_PROTOCOL
            </h2>
            <div style=\"height: 1px; width: 40px; background: var(--neon-color); margin: 1rem 0 1.5rem; opacity: 0.6;\"></div>
            <p class=\"uppercase tracking-[0.4em]\" style=\"font-size: 14px; font-weight: bold; opacity: 0.6; margin-bottom: 2rem;\">
                SELECT SECURE GATEWAY : <span style=\"color: var(--neon-color)\">INITIALIZE</span>
            </p>
            <div id=\"provider-list\" class=\"flex flex-col gap-8 mb-12 items-center w-full\"></div>
            <button onclick=\"window.closeAuthHUD()\" class=\"hud-abort-btn-unique text-[11px] py-4 px-8 uppercase font-bold tracking-widest mt-4\">
                ABORT CONFIGURATION
            </button>
        </div>
    </div>
</body>
</html>
